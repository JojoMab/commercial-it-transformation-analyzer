name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run application
        run: python3 main.py

      - name: Run unit tests
        run: python3 -m unittest

      - name: Compile Python files
        run: python3 -m compileall .

